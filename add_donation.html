<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Lançamento | Copa Sustentável</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#1E392A', secondary: '#FF6B2C' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap');
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 p-6 flex flex-col items-center justify-center min-h-screen">
    <script>
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>

    <div class="lg:hidden fixed top-6 left-6 z-[60]">
        <a href="dashboard.html" class="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center text-primary">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>
    </div>

    <div class="max-w-xl w-full bg-white p-10 lg:p-16 rounded-[4rem] shadow-2xl border border-gray-100 mt-12 lg:mt-0">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black mb-2 tracking-tighter">Novo Lançamento</h1>
            <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Registre os materiais coletados</p>
        </div>

        <form id="form-donation" class="space-y-8">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-2">Turma / Nação</label>
                <select name="team_id" id="team_id" required class="w-full p-6 bg-gray-50 rounded-3xl border-none outline-none font-bold text-primary focus:ring-2 focus:ring-secondary appearance-none">
                    <option value="">Carregando turmas...</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-2">Tipo de Material</label>
                <select name="material_type" id="material_type" required class="w-full p-6 bg-gray-50 rounded-3xl border-none outline-none font-bold text-primary focus:ring-2 focus:ring-secondary appearance-none">
                    <option value="higiene">Higiene (02 pts/un)</option>
                    <option value="vestuario">Vestuário (05 pts/peça)</option>
                    <option value="leite">Leite Caixinha (10 pts/litro)</option>
                    <option value="reciclavel">Recicláveis (05 pts/3un)</option>
                    <option value="lacre">Lacre PET 2L (30 pts/garrafa)</option>
                </select>
            </div>

            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 ml-2">Quantidade</label>
                <input type="number" id="quantity" name="quantity" step="any" min="1" required placeholder="Digite a quantidade..."
                       class="w-full p-6 bg-gray-50 rounded-3xl border-none outline-none font-bold text-primary focus:ring-2 focus:ring-secondary">
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-primary text-white p-7 rounded-3xl font-black shadow-xl hover:bg-[#2D5A42] transition-all transform hover:-translate-y-1 active:scale-95 uppercase tracking-widest">
                REGISTRAR PONTUAÇÃO
            </button>
        </form>

        <div class="mt-12 text-center">
            <a href="dashboard.html" class="text-gray-400 font-black text-xs uppercase tracking-widest hover:text-secondary transition">Voltar ao Painel</a>
        </div>
    </div>

    <script>
        window.onload = async () => {
            await initDB();
            const data = await getDB();
            let options = '';
            data.teams.forEach(t => {
                options += `<option value="${t.id}">${t.name} - ${t.country}</option>`;
            });
            document.getElementById('team_id').innerHTML = options;
        };

        document.getElementById('form-donation').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = 'Registrando...';

            const teamId       = document.getElementById('team_id').value;
            const materialType = document.getElementById('material_type').value;
            const quantity     = document.getElementById('quantity').value;

            try {
                const ok = await addDonation(teamId, materialType, quantity);
                if (ok) {
                    alert('✅ Doação registrada com sucesso!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('❌ Erro ao registrar. Verifique os dados.');
                    btn.disabled = false;
                    btn.textContent = 'REGISTRAR PONTUAÇÃO';
                }
            } catch (err) {
                alert('❌ Erro: ' + err.message);
                btn.disabled = false;
                btn.textContent = 'REGISTRAR PONTUAÇÃO';
            }
        });
    </script>
</body>
</html>
